name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  BUN_VERSION: "1.3.14"
  WASM_BINDGEN_VERSION: "0.2.123"

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check lints
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Build workspace
        run: cargo build --workspace --locked

      - name: Check DSL formatting
        run: >
          cargo run --locked -- fmt --check
          examples/catalog.scm
          examples/test.scm
          examples/extensions/examples/catalog.scm
          examples/extensions/examples/*/*.scm

      - name: Smoke test CLI
        run: |
          cargo run --locked -- --catalog examples/catalog.scm list
          cargo run --locked -- --catalog examples/catalog.scm test

  node:
    name: Bun, docs, editor
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown

      - name: Install wasm-bindgen
        run: cargo install wasm-bindgen-cli --locked --version "$WASM_BINDGEN_VERSION"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check JS/TS formatting and lint
        run: bun run check

      - name: Check fallow rules
        run: bun run fallow:ci

      - name: Check docs site
        run: bun run docs:check

      - name: Check WASM reference data
        run: bun run wasm:reference:check

      - name: Check VS Code extension
        run: bun run vscode:check

      - name: Check VS Code generated bindings
        run: bun run vscode:compile:check

      - name: Build VS Code extension
        run: bun run vscode:compile:all

      - name: Check VSIX package
        run: bun run vscode:vsix:pack:check

      - name: Test VS Code WASM bridge
        run: bun run vscode:test:wasm

      - name: Install Chromium
        run: bunx --no-install playwright install --with-deps chromium

      - name: Test VS Code web extension
        run: bun run vscode:test:web

  docker:
    name: Docker verify image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build verification image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: verify
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
