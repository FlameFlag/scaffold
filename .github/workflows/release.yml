name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  BUN_VERSION: "1.3.14"
  RELEASE_TAG: ${{ github.ref_name }}
  WASM_BINDGEN_VERSION: "0.2.123"

jobs:
  binaries:
    name: Binary ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: scaffold
            archive: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            bin: scaffold
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            bin: scaffold
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: scaffold.exe
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target "${{ matrix.target }}" --bin scaffold

      - name: Package binary
        shell: bash
        env:
          RELEASE_MODE: package-binary
          TARGET: ${{ matrix.target }}
          BIN_NAME: ${{ matrix.bin }}
          ARCHIVE_KIND: ${{ matrix.archive }}
        run: .github/scripts/publish-release.sh

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: scaffold-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  vscode:
    name: VS Code extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown

      - name: Install wasm-bindgen
        run: cargo install wasm-bindgen-cli --locked --version "$WASM_BINDGEN_VERSION"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build VS Code extension
        run: bun run vscode:compile:all

      - name: Package VSIX
        run: bun run vscode:vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: scaffold-vscode-vsix
          path: editors/vscode/out/*.vsix
          if-no-files-found: error

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - binaries
      - vscode
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_MODE: tag
        shell: bash
        run: .github/scripts/publish-release.sh
